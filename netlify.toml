[build]
  publish = "public"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/mdd_full.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/api/iucn/*"
  to = "/.netlify/functions/iucn-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
