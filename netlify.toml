[build]
  publish = "public"

# The iucn-proxy.mjs function declares its own path via export const config
# so no redirect needed for /api/iucn/*

# Cache the species data for 1 day
[[headers]]
  for = "/mdd_full.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
