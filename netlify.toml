[build]
  publish = "public"

# Route /api/iucn/* to the Node.js proxy function
[[redirects]]
  from = "/api/iucn/*"
  to = "/.netlify/functions/iucn-proxy/:splat"
  status = 200

# Cache the species data file for 1 day
[[headers]]
  for = "/mdd_full.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
