<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mammal Tree of Life</title>
  <meta name="description" content="Interactive Tree of Life for all 6,871 mammal species — IUCN Red List status and iNaturalist CC0 photos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #040d1a; }
    #splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #040d1a; gap: 14px; z-index: 999;
    }
    #splash .icon { font-size: 52px; animation: breathe 2s ease-in-out infinite; }
    #splash .label { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #334155; }
    @keyframes breathe { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
  </style>
</head>
<body>
  <div id="splash">
    <div class="icon">🌳</div>
    <div class="label">Loading 6,871 mammal species…</div>
  </div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
